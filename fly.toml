app = "carrier-sales-jo"
primary_region = "sjc"

[build]

[env]
  ALLOWED_ORIGINS = "*"
  DATABASE_URL = "sqlite:////data/app.db"

[[mounts]]
  source = "carrier_sales_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
